<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Sukoon Technology Solutions logo">
  <defs>
    <!-- Diagonal blue (lower-left) -> teal/green (upper-right) to match the brand mark -->
    <linearGradient id="swirlGrad" x1="8%" y1="92%" x2="92%" y2="8%">
      <stop offset="0%" stop-color="#163a8a"/>
      <stop offset="40%" stop-color="#1f6fae"/>
      <stop offset="72%" stop-color="#1aa6b8"/>
      <stop offset="100%" stop-color="#3fbf94"/>
    </linearGradient>
    <linearGradient id="swirlGradInner" x1="8%" y1="92%" x2="92%" y2="8%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="55%" stop-color="#21a5c2"/>
      <stop offset="100%" stop-color="#5fd6a8"/>
    </linearGradient>
    <!-- One swirled blade; asymmetric tip gives the pinwheel rotation -->
    <path id="blade" d="M0,-8 C22,-26 31,-52 18,-80 C12,-96 -11,-92 -15,-71 C-19,-50 -10,-33 0,-8 Z"/>
  </defs>

  <g transform="translate(100,100)">
    <!-- Outer ring of blades -->
    <g fill="url(#swirlGrad)" stroke="#bfeede" stroke-width="1.4" stroke-opacity="0.45" stroke-linejoin="round">
      <use href="#blade" transform="rotate(0)"/>
      <use href="#blade" transform="rotate(51.43)"/>
      <use href="#blade" transform="rotate(102.86)"/>
      <use href="#blade" transform="rotate(154.29)"/>
      <use href="#blade" transform="rotate(205.71)"/>
      <use href="#blade" transform="rotate(257.14)"/>
      <use href="#blade" transform="rotate(308.57)"/>
    </g>
    <!-- Inner ring, offset half a step for the layered spiral depth -->
    <g fill="url(#swirlGradInner)" stroke="#d8f5ea" stroke-width="1.6" stroke-opacity="0.5" stroke-linejoin="round"
       transform="rotate(25.7) scale(0.6)">
      <use href="#blade" transform="rotate(0)"/>
      <use href="#blade" transform="rotate(51.43)"/>
      <use href="#blade" transform="rotate(102.86)"/>
      <use href="#blade" transform="rotate(154.29)"/>
      <use href="#blade" transform="rotate(205.71)"/>
      <use href="#blade" transform="rotate(257.14)"/>
      <use href="#blade" transform="rotate(308.57)"/>
    </g>
    <circle r="8" fill="#10355f"/>
  </g>
</svg>
